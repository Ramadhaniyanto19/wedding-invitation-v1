function genSlug(n,ex){var s=n.toLowerCase().replace(/[^a-z0-9\s\-\.]/g,'').replace(/[\.\s]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'').slice(0,60);if(!s)s='tamu-'+Math.random().toString(36).slice(2,7);if(ex&&ex[s]){var i=2;while(ex[s+'-'+i])i++;s=s+'-'+i;}return s;}

var DP='admin123';
async function hashP(p){try{var d=new TextEncoder().encode(p);var b=await crypto.subtle.digest('SHA-256',d);return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0')}).join('');}catch(e){var h=0;for(var i=0;i<p.length;i++){var c=p.charCodeAt(i);h=((h<<5)-h)+c;h=h&h;}return'f_'+Math.abs(h).toString(16);}}
async function doLogin(){var p=$('pwdInput').value,e=$('loginErr');e.textContent='';if(!p){e.textContent='Masukkan password';return;}try{var s=await refs.pwd.once('value');var st=s.val();if(!st){st=await hashP(DP);refs.pwd.set(st);}var ih=await hashP(p);if(ih===st){sessionStorage.setItem('auth','1');showDash();}else{e.textContent='Password salah!';}}catch(er){e.textContent='Terjadi kesalahan.';}}

function filterGuests(){var q=($('sG')?$('sG').value:'').toLowerCase();if(!window._g)return;var f={};Object.keys(window._g).forEach(function(k){if(window._g[k].toLowerCase().includes(q)||k.toLowerCase().includes(q))f[k]=window._g[k];});renderG(f);}

function openGuestModal(slug){var isE=!!slug;var name=isE?(window._g[slug]||''):'';var body=fld('Nama Tamu','gN',name)+'<div class="mb-4"><label class="block text-xs uppercase tracking-wider text-white/40 mb-1.5">Slug</label><div class="flex gap-2"><input type="text" id="gS" value="'+esc(slug||'')+'" placeholder="auto-dari-nama" class="flex-1 px-3 py-2.5 bg-white/5 border border-white/10 rounded-xl text-white text-sm outline-none focus:border-gold-500/50 transition font-mono"><button type="button" onclick="autoSl()" class="px-3 py-2.5 bg-white/5 border border-white/10 rounded-xl text-white/40 text-xs hover:border-gold-500/30 hover:text-gold-400 transition whitespace-nowrap">Auto</button></div></div><div class="mb-4 p-3 rounded-xl bg-white/[0.02] border border-white/[0.06]"><p class="text-[10px] text-white/30 mb-1">Preview Link:</p><div class="link-box" id="gLP">'+esc(inviteBase())+(slug||'...')+'</div></div><button onclick="saveGuest(\''+esc(slug||'')+'\')" class="w-full py-2.5 bg-gradient-to-r from-gold-600 to-gold-400 text-dark-400 rounded-xl text-sm font-semibold hover:-translate-y-0.5 transition-all">'+(isE?'Simpan Perubahan':'Tambah Tamu')+'</button>';openModal(isE?'Edit Tamu':'Tambah Tamu',body);setTimeout(function(){var nE=$('gN'),sE=$('gS');if(nE&&sE){var up=function(){var p=$('gLP');if(p)p.textContent=inviteBase()+(sE.value||'...');};nE.addEventListener('input',function(){if(!isE)sE.value=genSlug(nE.value,window._g);up();});sE.addEventListener('input',up);}},50);}
function autoSl(){var n=$('gN')?$('gN').value.trim():'';if(!n){toast('Isi nama dulu');return;}var ex=Object.assign({},window._g||{});var cs=$('gS')?$('gS').value:'';if(cs&&ex[cs])delete ex[cs];if($('gS'))$('gS').value=genSlug(n,ex);var p=$('gLP');if(p)p.textContent=inviteBase()+($('gS')?$('gS').value:'');}
function saveGuest(old){var n=$('gN').value.trim();var s=$('gS').value.trim();if(!n){toast('Nama wajib diisi');return;}if(!s)s=genSlug(n,window._g);s=s.toLowerCase().replace(/[^a-z0-9\-]/g,'').replace(/-+/g,'-').replace(/^-|-$/g,'');if(!s)s='tamu-'+Math.random().toString(36).slice(2,7);if(old&&old!==s)refs.guests.child(old).remove();refs.guests.child(s).set(n);closeModal();toast(old?'Tamu diperbarui':'Tamu ditambahkan');setTimeout(lGuests,300);}

function openImportModal(){openModal('Import Batch Tamu','<div class="mb-4 p-3 rounded-xl bg-gold-500/5 border border-gold-500/15"><p class="text-xs text-white/50 mb-2"><iconify-icon icon="solar:info-circle-bold-duotone" class="text-gold-500 mr-1"></iconify-icon> Satu nama per baris. Custom slug: <code class="bg-white/10 px-1 rounded text-gold-300">Nama | slug</code></p></div><div class="mb-4"><textarea id="impN" rows="10" placeholder="Bapak Rahmat Hidayat\nIbu Sinta Dewi\nBudi Santoso | budi-s" class="w-full px-3 py-2.5 bg-white/5 border border-white/10 rounded-xl text-white text-sm outline-none focus:border-gold-500/50 transition resize-y font-mono text-xs leading-relaxed"></textarea></div><div id="impP" class="mb-4"></div><div class="flex gap-2"><button onclick="prevImp()" class="flex-1 py-2.5 bg-white/5 border border-white/10 text-white/60 rounded-xl text-sm font-medium hover:border-gold-500/30 hover:text-gold-400 transition-all"><iconify-icon icon="solar:eye-bold-duotone" class="mr-1"></iconify-icon> Preview</button><button onclick="doImp()" class="flex-1 py-2.5 bg-gradient-to-r from-gold-600 to-gold-400 text-dark-400 rounded-xl text-sm font-semibold hover:-translate-y-0.5 transition-all"><iconify-icon icon="solar:import-bold-duotone" class="mr-1"></iconify-icon> Import</button></div>');}
function parseImp(){var t=$('impN')?$('impN').value:'';var lines=t.split('\n').map(function(l){return l.trim();}).filter(function(l){return l.length>0;});var res=[];var ex=Object.assign({},window._g||{});lines.forEach(function(line){var p=line.split('|').map(function(x){return x.trim();});var name=p[0];var slug=p[1]||'';if(!name)return;if(!slug){slug=genSlug(name,ex);}else{slug=slug.toLowerCase().replace(/[^a-z0-9\-]/g,'').replace(/-+/g,'-').replace(/^-|-$/g,'');if(!slug)slug=genSlug(name,ex);if(ex[slug]){var i=2;while(ex[slug+'-'+i])i++;slug=slug+'-'+i;}}ex[slug]=name;res.push({name:name,slug:slug});});return res;}

function doImp(){var r=parseImp();if(!r.length){toast('Tidak ada nama');return;}var u={};r.forEach(function(x){u[x.slug]=x.name;});refs.guests.update(u);closeModal();toast(r.length+' tamu diimport!');setTimeout(lGuests,300);}

function tComments(){return'<div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-6"><div><h1 class="text-2xl font-serif font-light">Ucapan</h1><p class="text-white/40 text-sm mt-1">Kelola ucapan dari tamu</p></div><button onclick="openCmtModal()" class="flex items-center gap-2 px-4 py-2.5 bg-gradient-to-r from-gold-600 to-gold-400 text-dark-400 rounded-xl text-sm font-semibold hover:-translate-y-0.5 hover:shadow-lg hover:shadow-gold-500/20 transition-all whitespace-nowrap"><iconify-icon icon="solar:add-circle-bold-duotone"></iconify-icon> Tambah</button></div><div class="mb-4"><input type="text" id="sC" placeholder="Cari nama atau pesan..." oninput="filterCmt()" class="w-full px-4 py-2.5 bg-white/5 border border-white/10 rounded-xl text-white text-sm outline-none focus:border-gold-500/50 transition"></div><div id="cList">'+spin()+'</div>';}
function lComments(){refs.wishes.orderByChild('timestamp').once('value',function(s){window._c=Object.entries(s.val()||{}).map(function(e){return{k:e[0],name:e[1].name,msg:e[1].message,ts:e[1].timestamp};}).sort(function(a,b){return b.ts-a.ts;});renderC(window._c);});}
function filterCmt(){var q=($('sC')?$('sC').value:'').toLowerCase();if(!window._c)return;renderC(window._c.filter(function(c){return c.name.toLowerCase().includes(q)||c.msg.toLowerCase().includes(q);}));}
function renderC(a){if(!a.length){$('cList').innerHTML=empty('Tidak ada ucapan');return;}$('cList').innerHTML='<div class="space-y-2">'+a.map(function(c){return'<div class="bg-white/[0.02] border border-white/[0.06] rounded-xl p-4 card-hover fade-in"><div class="flex items-start gap-3"><div class="w-9 h-9 rounded-full bg-gradient-to-br from-gold-600 to-gold-400 flex items-center justify-center text-dark-400 text-xs font-bold flex-shrink-0">'+c.name.split(' ').map(function(n){return n[0];}).join('').toUpperCase().slice(0,2)+'</div><div class="flex-1 min-w-0"><div class="flex items-center gap-2 flex-wrap"><span class="font-medium text-sm">'+esc(c.name)+'</span><span class="text-[10px] text-white/25">'+timeAgo(c.ts)+'</span></div><p class="text-sm text-white/50 mt-1 break-words">'+esc(c.msg)+'</p><div class="text-[10px] text-white/20 mt-1.5">'+new Date(c.ts).toLocaleString('id-ID')+'</div></div><div class="flex gap-1.5 flex-shrink-0"><button onclick="openCmtModal(\''+c.k+'\')" class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center text-white/30 hover:text-gold-400 hover:bg-gold-500/10 transition"><iconify-icon icon="solar:pen-bold-duotone" class="text-sm"></iconify-icon></button><button onclick="delCmt(\''+c.k+'\')" class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center text-white/30 hover:text-red-400 hover:bg-red-500/10 transition"><iconify-icon icon="solar:trash-bin-trash-bold-duotone" class="text-sm"></iconify-icon></button></div></div></div>';}).join('')+'</div>';}
function openCmtModal(k){var isE=!!k;var d={name:'',msg:''};if(isE){var f=window._c.find(function(x){return x.k===k;});if(f)d=f;}openModal(isE?'Edit Ucapan':'Tambah Ucapan',fld('Nama','mN',d.name)+fld('Pesan','mM',d.msg,'textarea')+'<button onclick="saveCmt(\''+(k||'')+'\')" class="w-full py-2.5 bg-gradient-to-r from-gold-600 to-gold-400 text-dark-400 rounded-xl text-sm font-semibold hover:-translate-y-0.5 transition-all">'+(isE?'Simpan Perubahan':'Tambah Ucapan')+'</button>');}
function saveCmt(k){var n=$('mN').value.trim(),m=$('mM').value.trim();if(!n||!m){toast('Nama dan pesan wajib diisi');return;}if(k)refs.wishes.child(k).update({name:n,message:m});else refs.wishes.push({name:n,message:m,timestamp:Date.now()});closeModal();toast(k?'Ucapan diperbarui':'Ucapan ditambahkan');setTimeout(lComments,300);}
function delCmt(k){showConfirm('Hapus Ucapan','Ucapan ini akan dihapus.',function(){refs.wishes.child(k).remove();toast('Ucapan dihapus');setTimeout(lComments,300);});}

/* ========== GALERI ========== */
function tImages(){return'<div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4"><div><h1 class="text-2xl font-serif font-light">Galeri</h1><p class="text-white/40 text-sm mt-1">Kelola foto <span id="imgCnt" class="text-gold-400 font-medium"></span></p></div><button id="addImgBtn" onclick="openImgModal()" class="flex items-center gap-2 px-4 py-2.5 bg-gradient-to-r from-gold-600 to-gold-400 text-dark-400 rounded-xl text-sm font-semibold hover:-translate-y-0.5 hover:shadow-lg hover:shadow-gold-500/20 transition-all whitespace-nowrap"><iconify-icon icon="solar:add-circle-bold-duotone"></iconify-icon> Tambah Foto</button></div><div id="imgGrid">'+spin()+'</div>';}
function lImages(){refs.gallery.once('value',function(s){window._img=s.val()?s.val().map(function(u,i){return{url:u,idx:i};}):[];var c=window._img.length;var ce=$('imgCnt'),be=$('addImgBtn');if(ce)ce.textContent='('+c+'/'+MAX_GALLERY+')';if(be){if(c>=MAX_GALLERY){be.disabled=true;be.classList.add('opacity-40','pointer-events-none');}else{be.disabled=false;be.classList.remove('opacity-40','pointer-events-none');}}if(!window._img.length){$('imgGrid').innerHTML=empty('Belum ada foto.');return;}$('imgGrid').innerHTML='<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3">'+window._img.map(function(im){return'<div class="group relative aspect-square rounded-xl overflow-hidden border border-white/[0.06] card-hover fade-in"><img src="'+esc(im.url)+'" alt="" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" onerror="this.style.display=\'none\'"><div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div><div class="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity"><button onclick="openImgModal('+im.idx+')" class="w-7 h-7 rounded-full bg-black/60 backdrop-blur flex items-center justify-center text-white/70 hover:text-gold-400 transition"><iconify-icon icon="solar:pen-bold-duotone" class="text-xs"></iconify-icon></button><button onclick="delImg('+im.idx+')" class="w-7 h-7 rounded-full bg-black/60 backdrop-blur flex items-center justify-center text-white/70 hover:text-red-400 transition"><iconify-icon icon="solar:trash-bin-trash-bold-duotone" class="text-xs"></iconify-icon></button></div><div class="absolute bottom-2 left-2 opacity-0 group-hover:opacity-100 transition-opacity"><span class="text-[10px] text-white/50 bg-black/40 backdrop-blur px-2 py-0.5 rounded-full">#'+(im.idx+1)+'</span></div></div>';}).join('')+'</div>';});}
function openImgModal(idx){var isE=idx!==null&&idx!==undefined;var url=isE?window._img[idx].url:'';var cc=window._img?window._img.length:0;var full=cc>=MAX_GALLERY&&!isE;var body='';if(full){body='<div class="p-3 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm text-center">Batas '+MAX_GALLERY+' foto.</div>';}else{body='<div class="mb-4 p-3 rounded-xl bg-gold-500/5 border border-gold-500/15"><p class="text-xs text-white/50 mb-2"><iconify-icon icon="solar:info-circle-bold-duotone" class="text-gold-500 mr-1"></iconify-icon> Upload foto:</p><ol class="text-[11px] text-white/40 space-y-1 list-decimal list-inside"><li>Buka <a href="https://catbox.moe" target="_blank" class="text-gold-400 underline underline-offset-2 hover:text-gold-300">catbox.moe</a></li><li>Pilih foto, klik Upload</li><li>Copy link, paste di bawah</li></ol></div>'+imgFld('URL Gambar','mIU',url);if(url)body+='<div class="mb-4 rounded-xl overflow-hidden border border-white/10"><img src="'+esc(url)+'" class="w-full h-48 object-cover"></div>';body+='<button onclick="saveImg('+(isE?idx:'null')+')" class="w-full py-2.5 bg-gradient-to-r from-gold-600 to-gold-400 text-dark-400 rounded-xl text-sm font-semibold hover:-translate-y-0.5 transition-all">'+(isE?'Simpan Perubahan':'Tambah Foto')+'</button>';}openModal(isE?'Edit Foto':'Tambah Foto',body);}
function saveImg(idx){var url=$('mIU').value.trim();if(!url){toast('URL gambar wajib diisi');return;}var imgs=window._img?window._img.map(function(i){return i.url;}):[];if(idx===null&&imgs.length>=MAX_GALLERY){toast('Maksimal '+MAX_GALLERY);return;}if(idx!==null&&idx!==undefined)imgs[idx]=url;else imgs.push(url);refs.gallery.set(imgs);closeModal();toast((idx!==null&&idx!==undefined)?'Foto diperbarui':'Foto ditambahkan');setTimeout(lImages,300);}
function delImg(idx){showConfirm('Hapus Foto','Foto ini akan dihapus.',function(){var imgs=window._img.map(function(i){return i.url;});imgs.splice(idx,1);refs.gallery.set(imgs);toast('Foto dihapus');setTimeout(lImages,300);});}

/* ========== REKENING — dropdown bank + icon otomatis ========== */
function tAccounts(){return'<div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-6"><div><h1 class="text-2xl font-serif font-light">Rekening</h1><p class="text-white/40 text-sm mt-1">Kelola rekening hadiah</p></div><button onclick="openAccModal()" class="flex items-center gap-2 px-4 py-2.5 bg-gradient-to-r from-gold-600 to-gold-400 text-dark-400 rounded-xl text-sm font-semibold hover:-translate-y-0.5 hover:shadow-lg hover:shadow-gold-500/20 transition-all whitespace-nowrap"><iconify-icon icon="solar:add-circle-bold-duotone"></iconify-icon> Tambah</button></div><div id="accList">'+spin()+'</div>';}
function lAccounts(){refs.gifts.once('value',function(s){window._acc=s.val()||[];if(!window._acc.length){$('accList').innerHTML=empty('Belum ada rekening.');return;}$('accList').innerHTML='<div class="grid sm:grid-cols-2 gap-3">'+window._acc.map(function(a,i){var ic=bankIcon(a.bank);var displayNum=fmtNum(a.number);return'<div class="bg-white/[0.03] border border-white/[0.06] rounded-2xl p-5 card-hover fade-in"><div class="flex items-start justify-between mb-3"><div class="w-10 h-10 rounded-xl bg-gold-500/10 flex items-center justify-center"><iconify-icon icon="'+esc(ic)+'" class="text-gold-400 text-lg"></iconify-icon></div><div class="flex gap-1"><button onclick="openAccModal('+i+')" class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center text-white/30 hover:text-gold-400 hover:bg-gold-500/10 transition"><iconify-icon icon="solar:pen-bold-duotone" class="text-sm"></iconify-icon></button><button onclick="delAcc('+i+')" class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center text-white/30 hover:text-red-400 hover:bg-red-500/10 transition"><iconify-icon icon="solar:trash-bin-trash-bold-duotone" class="text-sm"></iconify-icon></button></div></div><div class="text-[10px] uppercase tracking-wider text-white/30 mb-1">'+esc(a.bank||'-')+'</div><div class="font-serif text-gold-300 text-lg tracking-wider mb-2">'+esc(displayNum)+'</div><div class="text-xs text-white/40">'+esc(a.holder||'-')+'</div></div>';}).join('')+'</div>';});}

function openAccModal(idx){
    var isE=idx!==null&&idx!==undefined;
    var d=isE?(window._acc[idx]||{}):{bank:'',number:'',holder:''};

    /* Bangun dropdown options */
    var opts=BANK_LIST.map(function(b){
        var sel=(d.bank===b.v)?' selected':'';
        return'<option value="'+esc(b.v)+'"'+sel+'>'+esc(b.l)+'</option>';
    }).join('');

    var selIcon=bankIcon(d.bank);

    var body=
        /* Preview icon */
        '<div class="bank-icon-box '+(d.bank?'lit':'')+'" id="accIconPrev"><iconify-icon icon="'+esc(selIcon)+'"></iconify-icon></div>'+

        /* Dropdown bank */
        '<div class="mb-4"><label class="block text-xs uppercase tracking-wider text-white/40 mb-1.5">Pilih Bank</label><div class="select-wrap"><select id="mBank" onchange="onBankChange()" class="w-full px-3 py-2.5 bg-white/5 border border-white/10 rounded-xl text-white text-sm outline-none focus:border-gold-500/50 transition">'+opts+'</select></div></div>'+

        /* Nama pemilik */
        fld('Nama Pemilik Rekening','mHolder',d.holder)+

        /* Nomor rekening */
        fld('Nomor Rekening','mNum',d.number)+

        '<p class="text-[10px] text-white/25 mb-4 flex items-center gap-1"><iconify-icon icon="solar:info-circle-linear" class="text-gold-500/50 text-xs"></iconify-icon>Nomor akan ditampilkan dengan format terpisah (contoh: 8320 5678 901). Nomor asli digunakan untuk tombol salin.</p>'+

        '<button onclick="saveAcc('+(isE?idx:'null')+')" class="w-full py-2.5 bg-gradient-to-r from-gold-600 to-gold-400 text-dark-400 rounded-xl text-sm font-semibold hover:-translate-y-0.5 transition-all">'+(isE?'Simpan Perubahan':'Tambah Rekening')+'</button>';

    openModal(isE?'Edit Rekening':'Tambah Rekening',body);
}

function onBankChange(){
    var sel=$('mBank');var prev=$('accIconPrev');
    if(!sel||!prev)return;
    var b=BANK_LIST.find(function(x){return x.v===sel.value;});
    var ic=b?b.i:'solar:wallet-bold-duotone';
    prev.innerHTML='<iconify-icon icon="'+esc(ic)+'"></iconify-icon>';
    if(b)prev.classList.add('lit');else prev.classList.remove('lit');
}

function saveAcc(idx){
    var bank=$('mBank').value;
    var holder=$('mHolder').value.trim();
    var number=$('mNum').value.trim();

    if(!bank){toast('Pilih bank');return;}
    if(!holder){toast('Nama pemilik wajib diisi');return;}
    if(!number){toast('Nomor rekening wajib diisi');return;}

    var data={
        bank:bank,
        icon:bankIcon(bank),
        number:number,
        rawNumber:number.replace(/\D/g,''),
        holder:holder
    };

    var arr=window._acc||[];
    if(idx!==null&&idx!==undefined)arr[idx]=data;else arr.push(data);
    refs.gifts.set(arr);
    closeModal();
    toast((idx!==null&&idx!==undefined)?'Rekening diperbarui':'Rekening ditambahkan');
    setTimeout(lAccounts,300);
}

function delAcc(idx){showConfirm('Hapus Rekening','Rekening ini akan dihapus.',function(){var arr=window._acc||[];arr.splice(idx,1);refs.gifts.set(arr);toast('Rekening dihapus');setTimeout(lAccounts,300);});}

/* ========== RSVP ========== */
function tRsvp(){return'<div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-6"><div><h1 class="text-2xl font-serif font-light">RSVP</h1><p class="text-white/40 text-sm mt-1">Kelola konfirmasi kehadiran</p></div><button onclick="openRsvpM()" class="flex items-center gap-2 px-4 py-2.5 bg-gradient-to-r from-gold-600 to-gold-400 text-dark-400 rounded-xl text-sm font-semibold hover:-translate-y-0.5 hover:shadow-lg hover:shadow-gold-500/20 transition-all whitespace-nowrap"><iconify-icon icon="solar:add-circle-bold-duotone"></iconify-icon> Tambah</button></div><div class="flex gap-2 mb-4 flex-wrap"><button onclick="filtRsvp(\'all\')" class="rf px-3 py-1.5 rounded-lg text-xs border border-white/10 text-white/40 hover:border-gold-500/30 hover:text-gold-400 transition" data-f="all">Semua</button><button onclick="filtRsvp(\'Hadir\')" class="rf px-3 py-1.5 rounded-lg text-xs border border-white/10 text-white/40 hover:border-green-500/30 hover:text-green-400 transition" data-f="Hadir">Hadir</button><button onclick="filtRsvp(\'Tidak Hadir\')" class="rf px-3 py-1.5 rounded-lg text-xs border border-white/10 text-white/40 hover:border-red-500/30 hover:text-red-400 transition" data-f="Tidak Hadir">Tidak Hadir</button></div><div class="mb-4"><input type="text" id="sR" placeholder="Cari nama..." oninput="doFiltR()" class="w-full px-4 py-2.5 bg-white/5 border border-white/10 rounded-xl text-white text-sm outline-none focus:border-gold-500/50 transition"></div><div id="rList">'+spin()+'</div>';}
var rFilt='all';
function filtRsvp(f){rFilt=f;document.querySelectorAll('.rf').forEach(function(b){b.classList.toggle('bg-gold-500/10',b.dataset.f===f);b.classList.toggle('border-gold-500/30',b.dataset.f===f);b.classList.toggle('text-gold-400',b.dataset.f===f);});doFiltR();}
function lRsvp(){refs.rsvp.orderByChild('timestamp').once('value',function(s){window._r=Object.entries(s.val()||{}).map(function(e){return{k:e[0],name:e[1].name,att:e[1].attendance,guests:e[1].guests,msg:e[1].message,ts:e[1].timestamp};}).sort(function(a,b){return b.ts-a.ts;});doFiltR();});}
function doFiltR(){var q=($('sR')?$('sR').value:'').toLowerCase();var arr=(window._r||[]).filter(function(r){return(rFilt==='all'||r.att===rFilt)&&(r.name.toLowerCase().includes(q)||(r.msg||'').toLowerCase().includes(q));});if(!arr.length){$('rList').innerHTML=empty('Tidak ada data');return;}$('rList').innerHTML='<div class="space-y-2">'+arr.map(function(r){return'<div class="bg-white/[0.02] border border-white/[0.06] rounded-xl p-4 card-hover fade-in"><div class="flex items-start gap-3"><div class="w-9 h-9 rounded-full '+(r.att==='Hadir'?'bg-green-500/10':'bg-red-500/10')+' flex items-center justify-center flex-shrink-0"><iconify-icon icon="'+(r.att==='Hadir'?'solar:check-circle-bold-duotone':'solar:close-circle-bold-duotone')+'" class="'+(r.att==='Hadir'?'text-green-400':'text-red-400')+' text-sm"></iconify-icon></div><div class="flex-1 min-w-0"><div class="flex items-center gap-2 flex-wrap"><span class="font-medium text-sm">'+esc(r.name)+'</span><span class="text-[10px] px-2 py-0.5 rounded-full '+(r.att==='Hadir'?'bg-green-500/10 text-green-400':'bg-red-500/10 text-red-400')+'">'+r.att+'</span><span class="text-[10px] text-white/25">'+r.guests+' orang</span></div>'+(r.msg?'<p class="text-sm text-white/40 mt-1">'+esc(r.msg)+'</p>':'')+'<div class="text-[10px] text-white/20 mt-1.5">'+timeAgo(r.ts)+' &middot; '+new Date(r.ts).toLocaleString('id-ID')+'</div></div><div class="flex gap-1.5 flex-shrink-0"><button onclick="openRsvpM(\''+r.k+'\')" class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center text-white/30 hover:text-gold-400 hover:bg-gold-500/10 transition"><iconify-icon icon="solar:pen-bold-duotone" class="text-sm"></iconify-icon></button><button onclick="delRsvp(\''+r.k+'\')" class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center text-white/30 hover:text-red-400 hover:bg-red-500/10 transition"><iconify-icon icon="solar:trash-bin-trash-bold-duotone" class="text-sm"></iconify-icon></button></div></div></div>';}).join('')+'</div>';}
function openRsvpM(k){var isE=!!k;var d={name:'',att:'Hadir',guests:'2',msg:''};if(isE){var f=window._r.find(function(x){return x.k===k;});if(f)d=f;}openModal(isE?'Edit RSVP':'Tambah RSVP',fld('Nama','rN',d.name)+'<div class="mb-4"><label class="block text-xs uppercase tracking-wider text-white/40 mb-1.5">Kehadiran</label><div class="select-wrap"><select id="rA" class="w-full px-3 py-2.5 bg-white/5 border border-white/10 rounded-xl text-white text-sm outline-none focus:border-gold-500/50 transition"><option value="Hadir"'+(d.att==='Hadir'?' selected':'')+'>Hadir</option><option value="Tidak Hadir"'+(d.att==='Tidak Hadir'?' selected':'')+'>Tidak Hadir</option></select></div></div>'+fld('Jumlah Tamu','rG',String(d.guests),'number')+fld('Pesan (opsional)','rM',d.msg,'textarea')+'<button onclick="saveRsvp(\''+(k||'')+'\')" class="w-full py-2.5 bg-gradient-to-r from-gold-600 to-gold-400 text-dark-400 rounded-xl text-sm font-semibold hover:-translate-y-0.5 transition-all">'+(isE?'Simpan Perubahan':'Tambah RSVP')+'</button>');}
function saveRsvp(k){var n=$('rN').value.trim(),a=$('rA').value,g=$('rG').value,m=$('rM').value.trim();if(!n){toast('Nama wajib diisi');return;}var d={name:n,attendance:a,guests:g,message:m,timestamp:Date.now()};if(k)refs.rsvp.child(k).update(d);else refs.rsvp.push(d);closeModal();toast(k?'RSVP diperbarui':'RSVP ditambahkan');setTimeout(lRsvp,300);}
function delRsvp(k){showConfirm('Hapus RSVP','Data ini akan dihapus.',function(){refs.rsvp.child(k).remove();toast('RSVP dihapus');setTimeout(lRsvp,300);});}

/* ========== PETA ========== */
function tMaps(){return'<div class="mb-8"><h1 class="text-2xl font-serif font-light">Peta Lokasi</h1><p class="text-white/40 text-sm mt-1">Atur embed peta Google Maps</p></div>'+cd('solar:map-point-bold-duotone','Embed Peta','<div class="mb-4 p-3 rounded-xl bg-gold-500/5 border border-gold-500/15"><p class="text-xs text-white/50"><iconify-icon icon="solar:info-circle-bold-duotone" class="text-gold-500 mr-1"></iconify-icon> Google Maps &rarr; "Bagikan" &rarr; "Sematkan peta" &rarr; copy <code class="bg-white/10 px-1 rounded text-gold-300">src="..."</code></p></div>'+fld('Embed URL (iframe src)','mapE',''))+cd('solar:map-arrow-right-bold-duotone','Link Buka Peta',fld('URL Link','mapL',''))+cd('solar:eye-bold-duotone','Preview','<div id="mapP" class="rounded-xl overflow-hidden border border-white/10" style="height:280px;background:rgba(255,255,255,.02)"></div><a id="mapPL" href="#" target="_blank" class="inline-flex items-center gap-2 mt-3 px-4 py-2 bg-gold-500/10 border border-gold-500/20 rounded-xl text-gold-400 text-xs hover:bg-gold-500/20 transition" style="display:none"><iconify-icon icon="solar:map-arrow-right-bold-duotone"></iconify-icon> Buka Peta</a>')+'<button onclick="saveMap()" class="px-6 py-2.5 bg-gradient-to-r from-gold-600 to-gold-400 text-dark-400 rounded-xl text-sm font-semibold hover:-translate-y-0.5 hover:shadow-lg hover:shadow-gold-500/20 transition-all"><iconify-icon icon="solar:diskette-bold-duotone" class="mr-1"></iconify-icon> Simpan Perubahan</button>';}
function lMaps(){refs.map.once('value',function(s){var d=s.val()||{embed:'',link:''};if($('mapE'))$('mapE').value=d.embed||'';if($('mapL'))$('mapL').value=d.link||'';updMapP(d.embed||'',d.link||'');});}
function updMapP(e,l){var p=$('mapP'),pl=$('mapPL');if(!p)return;p.innerHTML=e?'<iframe src="'+esc(e)+'" width="100%" height="100%" style="border:0;filter:grayscale(1) invert(.9) contrast(.8)" allowfullscreen="" loading="lazy"></iframe>':'<div class="flex items-center justify-center h-full text-white/20 text-sm">Belum ada peta</div>';if(pl){pl.href=l||'#';pl.style.display=l?'inline-flex':'none';}}
function saveMap(){var e=$('mapE').value.trim(),l=$('mapL').value.trim();refs.map.set({embed:e,link:l});updMapP(e,l);toast('Peta berhasil disimpan!');}
document.addEventListener('input',function(e){if(aTab==='maps'&&(e.target.id==='mapE'||e.target.id==='mapL')){updMapP(($('mapE')?$('mapE').value:'').trim(),($('mapL')?$('mapL').value:'').trim());}});

/* ========== MUSIK ========== */
var _mp=false;
function tMusic(){return'<div class="mb-8"><h1 class="text-2xl font-serif font-light">Musik</h1><p class="text-white/40 text-sm mt-1">Atur musik latar undangan</p></div>'+cd('solar:music-note-bold-duotone','File Musik','<div class="mb-4 p-3 rounded-xl bg-gold-500/5 border border-gold-500/15"><p class="text-xs text-white/50 mb-2"><iconify-icon icon="solar:info-circle-bold-duotone" class="text-gold-500 mr-1"></iconify-icon> Cara upload musik:</p><ol class="text-[11px] text-white/40 space-y-1 list-decimal list-inside"><li>Buka <a href="https://catbox.moe" target="_blank" class="text-gold-400 underline underline-offset-2 hover:text-gold-300">catbox.moe</a></li><li>Pilih file <strong class="text-white/50">MP3</strong>, klik Upload</li><li>Copy <strong class="text-white/50">link langsung</strong> (.mp3), paste di bawah</li></ol></div>'+audFld('URL File MP3','mU','')+fld('Judul Lagu (opsional)','mN',''))+cd('solar:play-circle-bold-duotone','Preview','<div class="flex items-center gap-4 p-4 rounded-xl bg-white/[0.02] border border-white/[0.06]"><button onclick="togMusic()" id="mPB" class="w-12 h-12 rounded-full bg-gold-500/15 border border-gold-500/30 flex items-center justify-center text-gold-400 hover:bg-gold-500/25 transition flex-shrink-0"><iconify-icon icon="solar:play-bold" class="text-xl" id="mPI"></iconify-icon></button><div class="flex-1 min-w-0"><div id="mT" class="text-sm font-medium truncate text-white/60">Belum ada musik</div><div id="mS" class="text-[10px] text-white/25 mt-0.5 truncate">Tambahkan URL MP3</div></div></div><audio id="aP" class="hidden" onended="mEnd()" onerror="mErr()"></audio>')+'<button onclick="saveMus()" class="px-6 py-2.5 bg-gradient-to-r from-gold-600 to-gold-400 text-dark-400 rounded-xl text-sm font-semibold hover:-translate-y-0.5 hover:shadow-lg hover:shadow-gold-500/20 transition-all"><iconify-icon icon="solar:diskette-bold-duotone" class="mr-1"></iconify-icon> Simpan Perubahan</button>';}
function lMusic(){refs.config.child('music').once('value',function(s){var d=s.val()||{};if($('mU'))$('mU').value=d.url||'';if($('mN'))$('mN').value=d.name||'';updMU(d.url||'',d.name||'');});}
function updMU(u,n){var a=$('aP'),t=$('mT'),s=$('mS');if(!a)return;_mp=false;var i=$('mPI');if(i)i.setAttribute('icon','solar:play-bold');if(u){a.src=u;a.load();t.textContent=n||'Musik Latar';t.classList.remove('text-white/60');t.classList.add('text-white/90');s.textContent=u.length>60?u.slice(0,60)+'...':u;}else{a.removeAttribute('src');a.load();t.textContent='Belum ada musik';t.classList.add('text-white/60');t.classList.remove('text-white/90');s.textContent='Tambahkan URL MP3';}}
function togMusic(){var a=$('aP'),i=$('mPI');if(!a||!a.src||a.src===window.location.href){toast('Tambahkan URL MP3 dulu');return;}if(_mp){a.pause();if(i)i.setAttribute('icon','solar:play-bold');_mp=false;}else{a.play().then(function(){if(i)i.setAttribute('icon','solar:pause-bold');_mp=true;}).catch(function(){toast('Gagal memutar audio');});}}
function mEnd(){_mp=false;var i=$('mPI');if(i)i.setAttribute('icon','solar:play-bold');}
function mErr(){_mp=false;var i=$('mPI');if(i)i.setAttribute('icon','solar:play-bold');toast('File audio tidak dapat dimuat');}
function saveMus(){var u=$('mU').value.trim(),n=$('mN').value.trim();refs.config.child('music').set({url:u,name:n});updMU(u,n);toast('Musik berhasil disimpan!');}

/* ========== PENGATURAN ========== */
function tSettings(){return'<div class="mb-8"><h1 class="text-2xl font-serif font-light">Pengaturan</h1><p class="text-white/40 text-sm mt-1">Pengaturan umum dashboard</p></div>'+cd('solar:lock-keyhole-bold-duotone','Ubah Password',fld('Password Baru','nP','','password')+fld('Konfirmasi Password','cP','','password')+'<button onclick="chgPwd()" class="w-full py-2.5 bg-gradient-to-r from-gold-600 to-gold-400 text-dark-400 rounded-xl text-sm font-semibold hover:-translate-y-0.5 transition-all">Ubah Password</button>')+cd('solar:restart-bold-duotone','Reset ke Default','<p class="text-sm text-white/40 mb-2">Kembalikan data mempelai ke pengaturan awal.</p><p class="text-xs text-white/25 mb-4">Ucapan, RSVP, galeri, rekening, dan tamu <strong>tidak</strong> terpengaruh.</p><button onclick="resetMp()" class="w-full py-2.5 bg-gold-500/10 border border-gold-500/30 text-gold-400 rounded-xl text-sm font-semibold hover:bg-gold-500/20 transition-all"><iconify-icon icon="solar:restart-bold-duotone" class="mr-1"></iconify-icon> Reset Mempelai ke Default</button>')+cd('solar:danger-triangle-bold-duotone','Zona Bahaya','<p class="text-sm text-white/40 mb-4">Menghapus <strong>semua</strong> data tidak dapat dibatalkan.</p><button onclick="resetAll()" class="w-full py-2.5 bg-red-500/10 border border-red-500/30 text-red-400 rounded-xl text-sm font-semibold hover:bg-red-500/20 transition-all"><iconify-icon icon="solar:trash-bin-trash-bold-duotone" class="mr-1"></iconify-icon> Hapus Semua Data</button>');}
async function chgPwd(){var p=$('nP').value,c=$('cP').value;if(!p){toast('Masukkan password baru');return;}if(p.length<6){toast('Minimal 6 karakter');return;}if(p!==c){toast('Password tidak cocok');return;}var h=await hashP(p);refs.pwd.set(h);$('nP').value='';$('cP').value='';toast('Password berhasil diubah!');}
function resetMp(){showConfirm('Reset Mempelai','Data mempelai dikembalikan ke default?',function(){var h={intro:DEFAULTS.mpIntro,groom:DEFAULTS.mpGroom,bride:DEFAULTS.mpBride,dateDisplay:DEFAULTS.mpDateDisplay,bgImage:DEFAULTS.mpBgImage,weddingDate:new Date(DEFAULTS.mpWeddingDate).toISOString()};var ay={bismillah:DEFAULTS.mpBismillah,text:DEFAULTS.mpAyatText,source:DEFAULTS.mpAyatSource};var g={name:DEFAULTS.mpGroomName,fullname:DEFAULTS.mpGroomFull,parent:DEFAULTS.mpGroomParent,photo:DEFAULTS.mpGroomPhoto};var b={name:DEFAULTS.mpBrideName,fullname:DEFAULTS.mpBrideFull,parent:DEFAULTS.mpBrideParent,photo:DEFAULTS.mpBridePhoto};var ak={name:DEFAULTS.mpAkadName,date:DEFAULTS.mpAkadDate,time:DEFAULTS.mpAkadTime,venue:DEFAULTS.mpAkadVenue};var re={name:DEFAULTS.mpResepsiName,date:DEFAULTS.mpResepsiDate,time:DEFAULTS.mpResepsiTime,venue:DEFAULTS.mpResepsiVenue};refs.config.child('hero').set(h);refs.config.child('ayat').set(ay);refs.config.child('groom').set(g);refs.config.child('bride').set(b);refs.config.child('events/akad').set(ak);refs.config.child('events/resepsi').set(re);refs.config.child('rsvpDeadline').set(DEFAULTS.mpRsvpDeadline);toast('Mempelai direset ke default!');setTimeout(function(){switchTab('mempelai');},500);});}
function resetAll(){showConfirm('Hapus Semua Data','SEMUA data dihapus permanen. Lanjutkan?',function(){refs.config.remove();refs.wishes.remove();refs.rsvp.remove();toast('Semua data dihapus!');setTimeout(function(){switchTab('overview');},500);});}
</script>
